<span class="group-icon" [ngStyle]="{ width: size, height: size }">
  @if (iconURL || !iconAbbreviation) {
    <img
      [ngStyle]="{ height: size }"
      src="{{ iconURL || defaultIconURL }}"
      alt="Group Icon"
    />
  }
  @if (!iconURL && iconAbbreviation) {
    <span class="icon-abbreviation" [ngStyle]="{ width: size, height: size }">{{
      iconAbbreviation
    }}</span>
  }
</span>
