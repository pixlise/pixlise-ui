<div class="picker-dialog-container" [style.opacity]="isVisible ? '1' : '0'">
  <div class="scrollable">
    @for (item of data.items; track item) {
      <div class="picker-item" [title]="isEnabled(item) ? '' : disabledTooltip">
        @if (!item.id) {
          <div class="txt-dlg-heading">{{ item.label }}</div>
        }
        @if (item.id) {
          <two-state-icon-button
            [activeIcon]="activeIcon"
            [inactiveIcon]="inactiveIcon"
            [disabledIcon]="disabledIcon"
            [active]="isSelected(item.id)"
            [disabled]="!isEnabled(item)"
            (onToggle)="onToggleItem(item)"
          >
          </two-state-icon-button>
          <span
            class="item-label"
            [ngClass]="{ disabled: !isEnabled(item) }"
            #tooltip="matTooltip"
            [matTooltip]="item.tooltip"
            [matTooltipDisabled]="!item.tooltip"
            >{{ item.label }}
            @if (item.tooltip) {
              <img
                class="warning-tooltip"
                src="assets/icons/error-triangle.svg"
                alt="Warning"
              />
            }
          </span>
          @if (item.icon) {
            <img
              [ngClass]="{ 'colour-disabled': !isEnabled(item) }"
              [src]="item.icon"
              alt="Icon"
            />
          }
        }
      </div>
    }
  </div>

  @if (showClearButton) {
    <push-button
      buttonStyle="outline"
      [disabled]="clearButtonDisabled"
      (onClick)="onClear()"
      >Clear</push-button
    >
  }
  @if (showSelectAllButton) {
    <push-button buttonStyle="outline" (onClick)="onSelectAll()"
      >Select All</push-button
    >
  }
  @if (showApplyButton) {
    <push-button buttonStyle="yellow" (onClick)="onApply()">Apply</push-button>
  }
</div>
