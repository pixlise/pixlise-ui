<div class="filters-row">
  <div class="broad-filters">
    <mat-select
      [(ngModel)]="visibleScanId"
      class="scan-filter"
      placeholder="Scan ..."
    >
      @for (scan of configuredScans; track scan) {
        <mat-option [value]="scan.id">{{ scan.title }} </mat-option>
      }
    </mat-select>
    <mat-select
      [multiple]="true"
      [(ngModel)]="selectedROITypes"
      class="roi-type"
      placeholder="ROI Type ..."
    >
      @for (option of roiTypeOptions; track option) {
        <mat-option [value]="option.type">{{ option.name }} </mat-option>
      }
    </mat-select>
  </div>
  <div class="option-filters">
    <filter-box
      placeholder="Filter Name..."
      (onFilterChanged)="onFilterText($event)"
    >
    </filter-box>
    <tag-picker
      type="roi"
      [selectedTagIDs]="filteredTagIDs"
      [showCurrentTagsSection]="false"
      (onTagSelectionChanged)="onTagFilterChanged($event)"
    >
    </tag-picker>
    <mat-select
      #tooltip="matTooltip"
      [matTooltip]="authorsTooltip"
      multiple
      [(ngModel)]="filteredAuthors"
      class="authors-filter"
      placeholder="Author ..."
    >
      @for (author of authors; track author) {
        <mat-option [value]="author.id">{{ author.name }} </mat-option>
      }
    </mat-select>
  </div>
</div>
