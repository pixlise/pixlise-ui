<ng-template #settingsMenu>
  <div class="widget-settings-menu">
    <div
      class="row link {{ logScale ? 'active' : '' }}"
      (click)="onToggleLogScale()"
      (keyup)="onToggleLogScale()"
      (keydown)="onToggleLogScale()"
      (keypress)="onToggleLogScale()"
      tabindex="0"
    >
      <div class="row-title">Log Scale</div>
      <action-button
        class="switch"
        [action]="logScale ? 'checkOn' : 'checkOff'"
      ></action-button>
    </div>
    <div
      class="row link {{ !isWhiskerDisplayModeNone ? 'active' : '' }}"
      (click)="onToggleWhiskerDisplayMode()"
      (keyup)="onToggleWhiskerDisplayMode()"
      (keydown)="onToggleWhiskerDisplayMode()"
      (keypress)="onToggleWhiskerDisplayMode()"
      tabindex="0"
    >
      <div class="row-title">Show Whiskers</div>
      <action-button
        class="switch"
        [action]="!isWhiskerDisplayModeNone ? 'checkOn' : 'checkOff'"
      ></action-button>
    </div>
    <div class="row above-title multi-switch-button-container">
      <div class="row-title {{ !isWhiskerDisplayModeNone ? 'active' : '' }}">
        Standard
      </div>
      @if (!isWhiskerDisplayModeNone) {
        <multi-switch-button
          [options]="whiskerDisplayModes"
          [value]="whiskerDisplayMode"
          (onChange)="onChangeWhiskerDisplayMode($event)"
          [darkMode]="true"
        >
        </multi-switch-button>
      }
      @if (isWhiskerDisplayModeNone) {
        <div
          class="empty-value"
          (click)="onToggleWhiskerDisplayMode()"
          (keyup)="onToggleWhiskerDisplayMode()"
          (keydown)="onToggleWhiskerDisplayMode()"
          (keypress)="onToggleWhiskerDisplayMode()"
          tabindex="0"
        >
          None
        </div>
      }
    </div>
    <div class="row above-title multi-switch-button-container">
      <div class="row-title active">Zoom Columns To</div>
      <multi-switch-button
        [options]="zoomModes"
        [value]="zoomMode"
        (onChange)="onChangeZoomMode($event)"
        [darkMode]="true"
      >
      </multi-switch-button>
    </div>
  </div>
</ng-template>

<interactive-canvas
  [ngClass]="mdl.cursorShown"
  [drawer]="drawer"
  [drawNotifier]="mdl"
  [interactionHandler]="interactionHandler"
  [transform]="transform"
>
</interactive-canvas>
@if (modelErrors.length > 0) {
  <div class="err-display">
    @for (err of modelErrors; track err) {
      <div>{{ err.message }}</div>
    }
  </div>
}
