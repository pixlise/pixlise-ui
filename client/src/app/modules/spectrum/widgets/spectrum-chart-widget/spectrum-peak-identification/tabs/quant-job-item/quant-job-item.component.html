<div class="job-item {{ selected ? 'selected' : '' }}">
  <div
    class="creator"
    #tooltip="matTooltip"
    [matTooltipShowDelay]="200"
    matTooltip="Creator: {{ creatorName || 'N/A' }}"
  >
    @if (icon) {
      <img [src]="icon" />
    }
    @if (!icon) {
      <span class="name-abbreviation">{{ creatorAbbreviation }}</span>
    }
  </div>
  <span title="Job Name: {{ job.name }}" class="name">{{ job.name }}</span>
  <span
    title="Job started: {{
      job.startUnixTimeSec * 1000 | date: 'd MMM y, HH:mm:ss'
    }}"
    >{{ job.startUnixTimeSec * 1000 | date: "d MMM y" }}</span
  >
  @if (status !== "RUNNING") {
    <span [title]="job.message">{{ status }}</span>
  }
  @if (status === "RUNNING") {
    <wait-spinner></wait-spinner>
  }
  @if (elapsedTimeMs > 0) {
    <span title="Job elapsed time">{{ elapsedTimeMs | date: "mm:ss" }}</span>
  }
</div>
