<ng-template #settingsMenu>
  <div class="widget-settings-menu"></div>
</ng-template>

<div class="widget-area">
  @if (!editMode) {
    <div
      class="markdown-container"
      [style]="{
        height: widgetContentHeight + 'px',
        width: widgetContentWidth + 'px',
      }"
    >
      <markdown [lineOffset]="5" [data]="content || '## Editable Text Panel'">
      </markdown>
    </div>
  }
  @if (editMode) {
    <textarea
      #descriptionEditMode
      class="text-field"
      type="text"
      autocomplete="off"
      data-lpignore="true"
      placeholder="## Editable Text Panel"
      [title]="markdownHelp"
      [(ngModel)]="content"
    ></textarea>
  }
</div>
